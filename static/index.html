<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG 检索服务</title>
<style>
  :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --accent: #58a6ff; --green: #3fb950; --red: #f85149; --muted: #8b949e; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem; }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 2rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
  .card h2 { font-size: 1rem; margin-bottom: 0.75rem; }
  textarea, input[type="text"] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 0.6rem; color: var(--text); font-size: 0.875rem; font-family: inherit; }
  textarea { resize: vertical; min-height: 80px; }
  .row { display: flex; gap: 0.5rem; align-items: center; }
  .row input { flex: 1; }
  button { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 0.5rem 1rem; font-size: 0.85rem; cursor: pointer; white-space: nowrap; }
  button:hover { opacity: 0.85; }
  button.outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .status { font-size: 0.8rem; padding: 0.4rem 0; }
  .status.ok { color: var(--green); }
  .status.err { color: var(--red); }
  .result-item { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem; margin-bottom: 0.5rem; }
  .result-item .score { font-size: 0.8rem; color: var(--accent); font-weight: 600; }
  .result-item .meta { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }
  .result-item .content { font-size: 0.875rem; margin-top: 0.25rem; line-height: 1.5; }
  .tenants { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-top: 0.5rem; }
  .tenant-tag { background: var(--border); color: var(--text); border-radius: 20px; padding: 0.2rem 0.6rem; font-size: 0.75rem; cursor: pointer; }
  .tenant-tag.active { background: var(--accent); }
  label { font-size: 0.8rem; color: var(--muted); display: block; margin-bottom: 0.25rem; }
  .section-label { margin-top: 0.75rem; }
  .drop-zone { border: 2px dashed var(--border); border-radius: 8px; padding: 1.5rem; text-align: center; color: var(--muted); cursor: pointer; transition: border-color 0.2s, background 0.2s; margin-top: 0.5rem; }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: rgba(88,166,255,0.05); }
  .file-tag { display: inline-flex; align-items: center; gap: 0.3rem; background: var(--border); color: var(--text); border-radius: 4px; padding: 0.2rem 0.5rem; font-size: 0.75rem; margin: 0.15rem; }
  .file-tag .remove { cursor: pointer; color: var(--red); font-weight: bold; }
</style>
</head>
<body>
<div class="container">
  <h1>RAG 检索服务</h1>
  <p class="subtitle">服务地址：<span id="serverUrl">http://localhost:8000</span> · 状态：<span id="healthStatus">检测中...</span></p>

  <!-- 索引文档 -->
  <div class="card">
    <h2>1. 索引文档</h2>
    <div class="row">
      <input type="text" id="tenantName" placeholder="知识库名称" value="demo" style="flex:1">
      <button id="btnRefresh" class="outline">刷新列表</button>
    </div>
    <div class="tenants" id="tenantList"></div>

    <!-- 文件上传区 -->
    <div class="drop-zone" id="dropZone">
      <div style="font-size:1.5rem;margin-bottom:0.3rem">+</div>
      <div>拖拽文件到这里，或点击选择</div>
      <div style="font-size:0.75rem;color:var(--muted);margin-top:0.2rem">支持 .txt .md .py .json 等文本文件</div>
      <input type="file" id="fileInput" multiple accept=".txt,.md,.py,.json,.csv,.log,.html,.css,.js,.ts,.yaml,.yml,.toml,.cfg,.ini" style="display:none">
    </div>
    <div id="fileList" style="margin-top:0.5rem"></div>

    <label class="section-label" for="indexText">或直接粘贴文本（整段作为一篇文档）</label>
    <textarea id="indexText" placeholder="直接粘贴文档内容..."></textarea>

    <div class="row" style="margin-top:0.75rem">
      <button id="btnIndex">建立索引</button>
      <button id="btnClear" class="outline">清空</button>
      <span class="status" id="indexStatus"></span>
    </div>
  </div>

  <!-- 搜索 -->
  <div class="card">
    <h2>2. 检索查询</h2>
    <div class="row">
      <input type="text" id="searchQuery" placeholder="输入查询内容..." style="flex:1">
      <button id="btnSearch">搜索</button>
    </div>
    <span class="status" id="searchStatus"></span>
    <div id="searchResults" style="margin-top:0.75rem"></div>
  </div>

  <!-- 统计 -->
  <div class="card">
    <h2>3. 索引统计</h2>
    <button id="btnStats">查看统计</button>
    <pre id="statsDisplay" style="margin-top:0.5rem;font-size:0.8rem;color:var(--muted)"></pre>
  </div>
</div>

<script>
const BASE = '';
let activeTenant = 'demo';
let uploadedFiles = [];  // { name, content }

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(BASE + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || res.statusText);
  return data;
}

function setStatus(el, ok, msg) {
  el.textContent = msg;
  el.className = 'status ' + (ok ? 'ok' : 'err');
}

function renderFileList() {
  const list = document.getElementById('fileList');
  if (uploadedFiles.length === 0) { list.innerHTML = ''; return; }
  list.innerHTML = '<span style="font-size:0.75rem;color:var(--muted)">已添加文件：</span> ' +
    uploadedFiles.map((f, i) => `<span class="file-tag">${escapeHtml(f.name)}<span class="remove" onclick="removeFile(${i})">x</span></span>`).join('');
}

function removeFile(i) {
  uploadedFiles.splice(i, 1);
  renderFileList();
}

// 文件上传
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.onclick = () => fileInput.click();

dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('drag-over'); };
dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
dropZone.ondrop = e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
};

fileInput.onchange = () => handleFiles(fileInput.files);

async function handleFiles(files) {
  for (const f of files) {
    const text = await f.text();
    uploadedFiles.push({ name: f.name, content: text });
  }
  fileInput.value = '';
  renderFileList();
}

// 健康检查
(async () => {
  try {
    await fetch(BASE + '/health');
    document.getElementById('healthStatus').textContent = '已连接';
    document.getElementById('healthStatus').className = 'status ok';
    refreshTenants();
  } catch {
    document.getElementById('healthStatus').textContent = '未连接';
    document.getElementById('healthStatus').className = 'status err';
  }
})();

async function refreshTenants() {
  try {
    const data = await api('GET', '/tenants');
    const list = document.getElementById('tenantList');
    list.innerHTML = data.tenants.map(t => `<span class="tenant-tag${t===activeTenant?' active':''}" onclick="selectTenant('${t}')">${t}</span>`).join('');
    if (data.tenants.length > 0 && !data.tenants.includes(activeTenant)) selectTenant(data.tenants[0]);
  } catch { /* empty */ }
}

function selectTenant(name) {
  activeTenant = name;
  document.getElementById('tenantName').value = name;
  refreshTenants();
}

// 建立索引
document.getElementById('btnIndex').onclick = async () => {
  const tenant = document.getElementById('tenantName').value || 'demo';
  const raw = document.getElementById('indexText').value.trim();

  let texts = [];
  if (uploadedFiles.length > 0) {
    texts = uploadedFiles.map(f => f.content);
  } else if (raw) {
    texts = [raw];  // 整段作为一篇文档，不拆行
  } else {
    return setStatus(document.getElementById('indexStatus'), false, '请上传文件或粘贴文档内容');
  }

  const status = document.getElementById('indexStatus');
  setStatus(status, true, '正在建立索引...');
  try {
    const data = await api('POST', `/tenants/${tenant}/index`, { texts });
    setStatus(status, true, `索引完成！共 ${data.chunk_count} 个分块，知识库 "${tenant}"`);
    activeTenant = tenant;
    refreshTenants();
  } catch (e) {
    setStatus(status, false, '索引失败：' + e.message);
  }
};

// 清空
document.getElementById('btnClear').onclick = () => {
  document.getElementById('indexText').value = '';
  uploadedFiles = [];
  renderFileList();
};

// 搜索
document.getElementById('btnSearch').onclick = async () => {
  const tenant = document.getElementById('tenantName').value || 'demo';
  const query = document.getElementById('searchQuery').value.trim();
  if (!query) return;
  const status = document.getElementById('searchStatus');
  setStatus(status, true, '搜索中...');
  try {
    const data = await api('POST', `/tenants/${tenant}/search`, { query, top_k: 5 });
    const container = document.getElementById('searchResults');
    if (!data.results || data.results.length === 0) {
      container.innerHTML = '<p style="color:var(--muted)">未找到相关结果。</p>';
      setStatus(status, true, '无结果');
    } else {
      container.innerHTML = data.results.map(r => `
        <div class="result-item">
          <div class="score">得分：${r.score.toFixed(4)} · 分块 #${r.chunk_index}</div>
          <div class="content">${escapeHtml(r.content)}</div>
          <div class="meta">来源：${JSON.stringify(r.metadata)}</div>
        </div>
      `).join('');
      setStatus(status, true, `找到 ${data.results.length} 条结果（知识库：${tenant}）`);
    }
  } catch (e) {
    setStatus(status, false, '搜索失败：' + e.message);
  }
};

document.getElementById('searchQuery').onkeydown = e => { if (e.key === 'Enter') document.getElementById('btnSearch').click(); };

// 统计
document.getElementById('btnStats').onclick = async () => {
  const tenant = document.getElementById('tenantName').value || 'demo';
  try {
    const data = await api('GET', `/tenants/${tenant}/stats`);
    document.getElementById('statsDisplay').textContent = JSON.stringify(data, null, 2);
  } catch (e) {
    document.getElementById('statsDisplay').textContent = '查询失败：' + e.message;
  }
};

document.getElementById('btnRefresh').onclick = refreshTenants;

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
